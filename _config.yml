# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site.
# If you change this file, please restart the server process or wait for GitHub Pages to rebuild.

# Basic Site Settings
locale                   : "en-US"
site_theme               : "default"
title                    : "Abhijit Kumar Ghosh"
title_separator          : "-"
name                     : &name "Abhijit Kumar Ghosh"
description              : &description "Academic portfolio of Abhijit Kumar Ghosh, Lecturer in Computer Science and Engineering, with research interests in Machine Learning, Deep Learning, Computer Vision, Medical Image Analysis, Trustworthy AI, Time-Series Forecasting, and Applied Data Science."
url                      : "https://abhijitkghosh.github.io"
baseurl                  : ""
repository               : "abhijitkghosh/abhijitkghosh.github.io"

# Site Author
# The following controls what appears in the author profile sidebar.
# If a field is blank, the icon and link will not appear.
# Additional customization can be done by editing /_includes/author-profile.html
author:
  # Biographic information
  avatar           : "Abhijit.jpg"
  name             : "Abhijit Kumar Ghosh"
  pronouns         :
  bio              : "Lecturer, Department of Computer Science and Engineering, European University of Bangladesh. My research interests include Machine Learning, Deep Learning, Computer Vision, Medical Image Analysis, Trustworthy AI, Time-Series Forecasting, and Applied Data Science."
  location         : "Dhaka, Bangladesh"
  employer         : "European University of Bangladesh"
  uri              : "https://abhijitkghosh.github.io"
  email            : "abhijit.kumar.ghosh.77880@gmail.com"

  # Academic websites
  academia         :
  arxiv            :
  googlescholar    : "https://scholar.google.com/citations?user=NoTxxDQAAAAJ&hl=en&oi=ao"
  inspire-hep      :
  impactstory      :
  orcid            : "https://orcid.org/0009-0006-6633-4849"
  semantic         :
  ssrn             :
  pubmed           :
  researchgate     : "https://www.researchgate.net/profile/Abhijit-Ghosh-28?ev=hdr_xprf"
  scopus           :
  zotero           :

  # Repositories and software development
  bitbucket        :
  codepen          :
  dribbble         :
  github           : "abhijitkghosh"
  kaggle           :
  stackoverflow    :

  # Social media
  artstation       :
  bluesky          :
  facebook         :
  flickr           :
  foursquare       :
  goodreads        :
  google_plus      :
  keybase          :
  instagram        :
  lastfm           :
  linkedin         :
  mastodon         :
  medium           :
  pinterest        :
  soundcloud       :
  steam            :
  telegram         :
  tumblr           :
  twitter          :
  vine             :
  weibo            :
  wikipedia        :
  xing             :
  youtube          :
  zhihu            :

# Publication Category
publication_category:
  manuscripts:
    title: "Journal Articles / Preprints"
  conferences:
    title: "Conference Papers and Presentations"
  submissions:
    title: "Ongoing Submissions"

# Site Settings
teaser                   :
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false

comments:
  provider               :
  disqus:
    shortname            :
  discourse:
    server               :
  facebook:
    appid                :
    num_posts            :
    colorscheme          :

staticman:
  allowedFields          : ["name", "email", "url", "message"]
  branch                 : "master"
  commitMessage          : "New comment."
  filename               : comment-{@timestamp}
  format                 : "yml"
  moderation             : true
  path                   : "_data/comments/{options.slug}"
  requiredFields         : ["name", "email", "message"]
  transforms:
    email                : "md5"
  generatedFields:
    date:
      type               : "date"
      options:
        format           : "iso8601"

atom_feed:
  hide                   : false
  path                   :

# SEO Related
google_site_verification :
bing_site_verification   :
alexa_site_verification  :
yandex_site_verification :

# Social Sharing
twitter:
  username               :

facebook:
  username               :
  app_id                 :
  publisher              :

og_image                 :
og_description           :

# Social Profiles for SEO
social:
  type                   : Person
  name                   : *name
  links:
    - "https://abhijitkghosh.github.io"
    - "https://scholar.google.com/citations?user=NoTxxDQAAAAJ&hl=en&oi=ao"
    - "https://www.researchgate.net/profile/Abhijit-Ghosh-28?ev=hdr_xprf"
    - "https://orcid.org/0009-0006-6633-4849"
    - "https://github.com/abhijitkghosh"

# Analytics
analytics:
  provider               : false
  google:
    tracking_id          :

# Reading Files
include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor

keep_files:
  - .git
  - .svn

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown                  : kramdown
highlighter               : rouge
lsi                       : false
excerpt_separator         : "\n\n"
incremental               : false

# Markdown Processing
kramdown:
  input                   : GFM
  hard_wrap               : false
  auto_ids                : true
  footnote_nr             : 1
  entity_output           : as_char
  toc_levels              : 1..6
  smart_quotes            : lsquo,rsquo,ldquo,rdquo
  enable_coderay          : false

# Collections
collections:
  teaching:
    output                : true
    permalink            : /:collection/:path/
  publications:
    output                : true
    permalink            : /:collection/:path/
  portfolio:
    output                : true
    permalink            : /:collection/:path/
  talks:
    output                : true
    permalink            : /:collection/:path/

# Defaults
defaults:
  # _posts
  - scope:
      path                : ""
      type                : posts
    values:
      layout              : single
      author_profile      : true
      read_time           : true
      comments            : true
      share               : true
      related             : true

  # _pages
  - scope:
      path                : ""
      type                : pages
    values:
      layout              : single
      author_profile      : true

  # _teaching
  - scope:
      path                : ""
      type                : teaching
    values:
      layout              : single
      author_profile      : true
      share               : true
      comments            : true

  # _publications
  - scope:
      path                : ""
      type                : publications
    values:
      layout              : single
      author_profile      : true
      share               : true
      comments            : true

  # _portfolio
  - scope:
      path                : ""
      type                : portfolio
    values:
      layout              : single
      author_profile      : true
      share               : true
      comment             : true

  # _talks
  - scope:
      path                : ""
      type                : talks
    values:
      layout              : talk
      author_profile      : true
      share               : true

# Sass/SCSS
sass:
  sass_dir                : _sass
  style                   : compressed

# Outputting
permalink                 : /:categories/:title/
timezone                  : Asia/Dhaka

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Mimic GitHub Pages with --safe
whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Archives
category_archive:
  type                    : liquid
  path                    : /categories/

tag_archive:
  type                    : liquid
  path                    : /tags/

# HTML Compression
compress_html:
  clippings               : all
  ignore:
    envs                  : development
